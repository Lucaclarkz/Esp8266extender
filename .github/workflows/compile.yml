name: Build ESP8266 Bin

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Update board index
        run: |
          arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install ESP8266 Core
        run: |
          arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "ESPAsyncTCP"
          arduino-cli lib install "ESP Async WebServer"
          arduino-cli lib install "ArduinoJson@6.21.5"

      - name: Prepare Sketch
        run: |
          mkdir -p sketch
          cp Esp8266extender.ino sketch/sketch.ino

      - name: Compile Sketch
        run: |
          arduino-cli compile \
            --fqbn esp8266:esp8266:nodemcuv2 \
            --output-dir ./build \
            ./sketch

      - name: Show build files
        run: ls -R ./build

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: esp8266-firmware
          path: ./build/*.bin
